name: KynexOs Sovereign Build v183.0

on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Cek
        uses: actions/checkout@v4

      - name: PlatformIO Onbellegini Kur
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio
          key: ${{ runner.os }}-platformio-v183

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Derleme ve Birleştirme
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio
          # MUHAMMED: Bu komut her şeyi derler ve Python scripti ile tek dosya yapar
          pio run
          pio run --target buildfs

      - name: Master Firmware Yukle (Tek Dosya)
        uses: actions/upload-artifact@v4
        with:
          name: Kynex_Sovereign_Master_Image
          path: .pio/build/esp32-s3-devkitc-1/MASTER_KYNEX_SOVEREIGN.bin
          compression-level: 9
