name: Sovereign Juggernaut Build v293.0
on: [push]
jobs:
  build-sovereign:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Cek
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0
      - name: Juggernaut Fabrikasini Calistir
        run: |
          docker build -t factory .
          # Konteynırdan dosyaları kopyalamak için geçici bir isim veriyoruz
          docker create --name kynex_container factory
          mkdir -p output
          docker cp kynex_container:/kynex_out/. ./output/
          docker rm kynex_container
      - name: Paketi Yukle
        uses: actions/upload-artifact@v4
        with:
          name: Kynex_Sovereign_V293_Final
          path: output/
