# * Görev: Her kosulda derleme denemesi yapar ve bin dosyalarini paketler.
# **************************************************************************

name: Sovereign Brute Force Build v275.0

on: [push]

jobs:
  build-sovereign-modular:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu ve Alt Modulleri Cek
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Sovereign Fabrikasini Calistir (Docker)
        run: |
          # Imajı oluştur ve derlemeyi dene
          docker build -t sovereign-factory .
          
          # Konteynırdan çıktıları (başarılı olanları) al
          docker run --name sovereign-container sovereign-factory /bin/true
          mkdir -p final_pack
          docker cp sovereign-container:/kynex_out/. ./final_pack/ || echo "Kopyalanacak dosya bulunamadi."
          docker rm sovereign-container

      - name: Moduler Sovereign Paketini Yukle (Flash Ready)
        uses: actions/upload-artifact@v4
        with:
          name: Kynex_Sovereign_V275_Pack
          path: final_pack/
          if-no-files-found: warn
