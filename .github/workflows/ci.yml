# **************************************************************************
# * Kynex Sovereign - Retro-Go Master CI v193.0
# * Geliştirici: Muhammed (Kynex)
# * Donanım: ESP32-S3 N16R8 (16MB)
# * Hata Düzeltme: Submodule recursive derinliği artırıldı.
# * Talimat: Asla satır silmeden, tam ve tek parça kod blokları içinde ver.
# **************************************************************************

name: RetroGo_Sovereign_CI

on: [push]

env:
  # 2026 standartları için Node.js 24 ayarı
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # 🕹️ ANA GÖREV: DERLEME
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodlari Cek (Submoduller Dahil)
        uses: actions/checkout@v4
        with:
          # MUHAMMED: Bu iki satır emülatörlerin eksiksiz gelmesini sağlar
          submodules: 'recursive'
          fetch-depth: 0

      - name: Docker ile Derleme Yap
        run: |
          # Dockerfile'ı kullanarak MASTER imajı üret
          docker build -t retro-go-builder .
          
          # Konteynırdan çıktıları al
          docker run --name temp-container retro-go-builder /bin/true
          
          # 0x10000 adresine basılacak ana launcher
          docker cp temp-container:/app/build/launcher.bin ./launcher.bin
          
          # 0x0 adresine basılacak bootloader
          docker cp temp-container:/app/build/bootloader/bootloader.bin ./bootloader.bin
          
          # 0x8000 adresine basılacak harita
          docker cp temp-container:/app/build/partition_table/partition-table.bin ./partitions.bin
          
          docker rm temp-container

      - name: Final Bin Dosyalarini Paketle
        uses: actions/upload-artifact@v4
        with:
          name: Kynex_RetroGo_S3_Final_Bins
          path: |
            launcher.bin
            bootloader.bin
            partitions.bin
          compression-level: 9
