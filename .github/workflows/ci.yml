# **************************************************************************
# * Kynex Sovereign - Unified Dual System CI v213.0
# * Geliştirici: Muhammed (Kynex)
# * Donanım: ESP32-S3 N16R8 (16MB)
# * Sistem 1: Retro-Go (Factory) - Docker
# * Sistem 2: KynexOs (OTA_0) - Bağımsız Proje
# * Hata Düzeltme: mkfatfs pathing ve empty directory error fix.
# * Talimat: Asla satır silmeden, tam ve tek parça kod blokları içinde ver.
# **************************************************************************

name: RetroGo_Sovereign_Full_CI

on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # 🕹️ JOB 1: RETRO-GO (SİSTEM 1)
  build-retro-go:
    runs-on: ubuntu-latest
    steps:
      - name: Kodlari Cek
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Docker ile S3 Launcher Uret
        run: |
          docker build -t retro-go-builder .
          docker run --name temp-container retro-go-builder /bin/true
          docker cp temp-container:/kynex_out/launcher.bin ./launcher.bin
          docker cp temp-container:/kynex_out/bootloader.bin ./bootloader.bin
          docker cp temp-container:/kynex_out/partition-table.bin ./partitions.bin
          docker rm temp-container

      - name: Launcher Paketini Yukle
        uses: actions/upload-artifact@v4
        with:
          name: 01_RetroGo_Launcher_Package
          path: |
            launcher.bin
            bootloader.bin
            partitions.bin

  # 🖥️ JOB 2: KYNEX-OS (SİSTEM 2 - AYRI PROJE)
  build-kynex-os:
    runs-on: ubuntu-latest
    steps:
      - name: Kodlari Cek
        uses: actions/checkout@v4

      - name: PlatformIO ile KynexOs Derle
        run: |
          # Muhammed: KynexOs klasörüne girip bağımsız projenin firmware'ini üretiyoruz.
          cd KynexOs || cd kynex-os || echo "Klasor bulunamadi, ana dizin denenecek."
          python -m pip install --upgrade pip
          pip install platformio
          pio run

      - name: KynexOs Bin Yukle
        uses: actions/upload-artifact@v4
        with:
          name: 02_KynexOs_Package
          path: |
             KynexOs/.pio/build/*/firmware.bin
             kynex-os/.pio/build/*/firmware.bin

  # 📂 JOB 3: STORAGE (FFAT - ELDEKİ ÇEKİRDEKLER)
  build-storage:
    runs-on: ubuntu-latest
    steps:
      - name: Kodlari Cek
        uses: actions/checkout@v4

      - name: FFat Aracini Kur (mkfatfs)
        run: |
          python -m pip install --upgrade pip
          pip install platformio
          # MUHAMMED: --global ile aracı sisteme mühürlüyoruz
          pio pkg install --global --tool platformio/tool-mkfatfs
          # Aracı bulup tam yolunu (absolute path) kaydediyoruz
          MKFATFS_RAW_PATH=$(find ~/.platformio/packages/tool-mkfatfs -name "mkfatfs" | head -n 1)
          echo "MKFATFS_EXE=$MKFATFS_RAW_PATH" >> $GITHUB_ENV

      - name: FFat Imajini Paketle
        run: |
          # 1. Klasör yapısını garanti altına alıyoruz (Boşsa bile çökmemesi için)
          mkdir -p storage/data/retro-go/cores
          mkdir -p storage/data/roms
          
          # 2. Eğer klasör boşsa içine hayalet bir dosya atıyoruz (mkfatfs boş klasörü sevmez)
          touch storage/data/kynex_readme.txt
          
          # 3. Paketleme komutu (0x7F0000 = 8MB civarı)
          echo "Kullanilan Arac: ${{ env.MKFATFS_EXE }}"
          ${{ env.MKFATFS_EXE }} -c storage/data/ -s 0x7F0000 -t ffat ffat.bin

      - name: Storage Paketini Yukle
        uses: actions/upload-artifact@v4
        with:
          name: 03_Storage_Package
          path: ffat.bin
