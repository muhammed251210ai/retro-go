name: Sovereign Extractor Build v292.0
on: [push]
jobs:
  build-sovereign:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Cek
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0
      - name: Fabrikayi Calistir
        run: |
          docker build -t factory .
          docker run --name container factory /bin/true
          mkdir -p output
          docker cp container:/kynex_out/. ./output/
          docker rm container
      - name: Paketi Yukle
        uses: actions/upload-artifact@v4
        with:
          name: Kynex_Sovereign_V292_FULL
          path: output/
