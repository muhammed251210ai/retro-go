# **************************************************************************
# * Kynex Sovereign - Unified Dual System CI v212.0
# * Geliştirici: Muhammed (Kynex)
# * Donanım: ESP32-S3 N16R8 (16MB)
# * Sistem 1: Retro-Go (Factory) - Docker Tabanlı
# * Sistem 2: KynexOs (OTA_0) - Bağımsız PlatformIO Projesi
# * Hata Düzeltme: Line 69 Syntax ve mkfatfs Global Tool Fix.
# * Talimat: Asla satır silmeden, tam ve tek parça kod blokları içinde ver.
# **************************************************************************

name: RetroGo_Sovereign_Full_CI

on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # 🕹️ JOB 1: RETRO-GO (SİSTEM 1 - FACTORY)
  build-retro-go:
    runs-on: ubuntu-latest
    steps:
      - name: Kodlari Cek
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Docker ile S3 Launcher Uret
        run: |
          docker build -t retro-go-builder .
          docker run --name temp-container retro-go-builder /bin/true
          docker cp temp-container:/kynex_out/launcher.bin ./launcher.bin
          docker cp temp-container:/kynex_out/bootloader.bin ./bootloader.bin
          docker cp temp-container:/kynex_out/partition-table.bin ./partitions.bin
          docker rm temp-container

      - name: Launcher Paketini Yukle
        uses: actions/upload-artifact@v4
        with:
          name: 01_RetroGo_Launcher_Package
          path: |
            launcher.bin
            bootloader.bin
            partitions.bin

  # 🖥️ JOB 2: KYNEX-OS (SİSTEM 2 - OTA_0)
  build-kynex-os:
    runs-on: ubuntu-latest
    steps:
      - name: Kodlari Cek
        uses: actions/checkout@v4

      - name: PlatformIO ile KynexOs Derle
        run: |
          # Muhammed: KynexOs projesi hangi klasördeyse oraya giriyoruz
          # Klasör adın neyse (örn: KynexOs_Project) onu yazmalısın.
          # Biz genel olarak "KynexOs" klasörüne bakıyoruz.
          cd KynexOs || cd kynex-os || echo "Proje klasoru aranıyor..."
          python -m pip install --upgrade pip
          pip install platformio
          pio run

      - name: KynexOs Bin Yukle
        uses: actions/upload-artifact@v4
        with:
          name: 02_KynexOs_Package
          path: |
             KynexOs/.pio/build/*/firmware.bin
             kynex-os/.pio/build/*/firmware.bin

  # 📂 JOB 3: STORAGE (FFAT - ÇEKİRDEKLER VE OYUNLAR)
  build-storage:
    runs-on: ubuntu-latest
    steps:
      - name: Kodlari Cek
        uses: actions/checkout@v4

      - name: FFat Aracini Kur (mkfatfs)
        run: |
          python -m pip install --upgrade pip
          pip install platformio
          # MUHAMMED: --global parametresi PlatformIO'nun "platformio.ini yok" hatasını çözer.
          pio pkg install --global --tool platformio/tool-mkfatfs
          # Aracı sistemde bulup yolunu kaydediyoruz
          MKFATFS_PATH=$(find ~/.platformio/packages/tool-mkfatfs -name "mkfatfs" | head -n 1)
          echo "MKFATFS_EXE=$MKFATFS_PATH" >> $GITHUB_ENV

      - name: FFat Imajini Paketle
        run: |
          # Muhammed, elindeki çekirdekleri storage/data/ klasörüne koymalısın.
          # Haritadaki FFat boyutu (Size): 0x7F0000 (Yaklaşık 8MB)
          mkdir -p storage/data
          cd storage
          ${{ env.MKFATFS_EXE }} -c data/ -s 0x7F0000 -t ffat ffat.bin

      - name: Storage Paketini Yukle
        uses: actions/upload-artifact@v4
        with:
          name: 03_Storage_Package
          path: storage/ffat.bin
