name: Sovereign Victory Build v281.0
on: [push]
jobs:
  build-sovereign:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Cek
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0
      - name: Zafer Fabrikasini Calistir
        run: |
          docker build -t factory .
          docker run --name container factory /bin/true
          mkdir -p output
          docker cp container:/kynex_out/. ./output/
          docker rm container
      - name: Uretilen Paketi Yukle
        uses: actions/upload-artifact@v4
        with:
          name: Kynex_Sovereign_V281
          path: output/
