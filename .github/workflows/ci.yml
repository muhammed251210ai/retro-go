# **************************************************************************
# * Kynex Sovereign - Pure Modular Build CI v267.1
# **************************************************************************

name: Sovereign Modular Build v267.1

on: [push]

jobs:
  build-modular:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Çek
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Sovereign Modular Derleme (Docker)
        run: |
          docker build -t retro-go-builder .
          docker run --name modular-container retro-go-builder /bin/true
          mkdir -p release_bins/apps
          
          # Artık tüm .bin dosyaları garantili olarak kopyalanıyor
          docker cp modular-container:/kynex_out/. ./release_bins/apps/
          docker rm modular-container

      - name: Modüler Paketi Yükle
        uses: actions/upload-artifact@v4
        with:
          name: Sovereign_Modular_v267
          path: release_bins/apps/
