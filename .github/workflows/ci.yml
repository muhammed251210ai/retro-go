# **************************************************************************
# * Kynex Sovereign - Retro-Go Independent CI v192.0
# * Geliştirici: Muhammed (Kynex)
# * Donanım: ESP32-S3 N16R8 (16MB)
# * Hata Düzeltme: Submodule 'recursive' eklendi, exit code 1 engellendi.
# * Talimat: Asla satır silmeden, tam ve tek parça kod blokları içinde ver.
# **************************************************************************

name: RetroGo_Independent_Build

on: [push]

env:
  # GitHub Actions 2026 standartları için Node.js 24 ayarı
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # 🕹️ ANA İŞ: RETRO-GO DERLEME
  build-retro-go:
    runs-on: ubuntu-latest
    steps:
      - name: Kodlari Cek (Alt Moduller Dahil)
        uses: actions/checkout@v4
        with:
          # MUHAMMED: Bu satır çok kritik! Emülatör kodlarını (nes, doom vb.) çekmeyi sağlar.
          submodules: 'recursive'
          fetch-depth: 0

      - name: Retro-Go Derle (Dockerfile ile Docker Build)
        run: |
          # Dockerfile dosyasının ana dizinde olduğunu varsayıyoruz
          docker build -t retro-go-builder .
          
          # Konteynırı oluştur
          docker run --name temp-container retro-go-builder /bin/true
          
          # Derlenen kritik sistem dosyalarını dışarı al
          # Launcher (0x10000)
          docker cp temp-container:/app/build/launcher.bin ./launcher.bin
          
          # Bootloader (0x0)
          docker cp temp-container:/app/build/bootloader/bootloader.bin ./bootloader.bin
          
          # Partition Table (0x8000)
          docker cp temp-container:/app/build/partition_table/partition-table.bin ./partitions.bin
          
          # Konteynırı temizle
          docker rm temp-container

      - name: Retro-Go Bin Dosyalarini Paketle
        uses: actions/upload-artifact@v4
        with:
          name: RetroGo_Sovereign_Final_Bins
          path: |
            launcher.bin
            bootloader.bin
            partitions.bin
          compression-level: 9
