# **************************************************************************
# * Kynex Sovereign - Pure Modular Build CI v267.0
# * Geliştirici: Muhammed (Kynex)
# * Görev: Launcher ve çekirdekleri AYRI AYRI dosyalar olarak derler.
# **************************************************************************

name: Sovereign Modular Build v267.0

on: [push]

jobs:
  build-modular:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Cek
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Sovereign Modular Derleme (Docker)
        run: |
          # MUHAMMED: Docker içinde her emülatörü ayrı bin dosyası olarak pişiriyoruz.
          docker build -t retro-go-builder .
          docker run --name modular-container retro-go-builder /bin/true
          mkdir -p release_bins
          
          # Tüm bin dosyalarını (launcher ve çekirdekler) dışarı aktar
          docker cp modular-container:/kynex_out/. ./release_bins/
          docker rm modular-container

      - name: Modüler Paketi Yukle
        uses: actions/upload-artifact@v4
        with:
          name: Sovereign_Modular_v267
          path: release_bins/
