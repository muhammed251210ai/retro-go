# * Görev: Tüm alt modülleri Docker'a taşır ve hatasız bin üretir.
# **************************************************************************

name: Sovereign Bulletproof Build v271.0

on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-sovereign-modular:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu ve Alt Modulleri Cek
        uses: actions/checkout@v4
        with:
          submodules: 'recursive' # MUHAMMED: Bu satır hayat kurtarır!
          fetch-depth: 0

      - name: Sovereign Fabrikasini Calistir
        run: |
          # Docker imajını oluştur
          docker build -t sovereign-factory .
          
          # Konteynırdan çıktıları final_pack klasörüne çek
          docker run --name sovereign-container sovereign-factory /bin/true
          mkdir -p final_pack
          docker cp sovereign-container:/kynex_out/. ./final_pack/
          docker rm sovereign-container

      - name: Moduler Sovereign Paketini Yukle
        uses: actions/upload-artifact@v4
        with:
          name: Kynex_Sovereign_Modular_v271
          path: final_pack/
          compression-level: 9
