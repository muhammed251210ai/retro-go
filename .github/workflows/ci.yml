name: ci

on:
  workflow_dispatch:      # Manuel başlatma izni
  push:                   # Her koda bir şey eklediğinde çalışır

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Build işlemi için geniş alan açıyoruz (ESP-IDF ve Docker için gerekli)
    - name: Cleanup runner
      run: |
        df -h
        sudo rm -rf /opt/microsoft /usr/local/.ghcup /usr/local/julia* /usr/share/dotnet /usr/share/swift /usr/lib/llvm*
        df -h

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive # Retro-Go alt modüllerini (Core'lar) çekmek için kritik

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Docker imajını oluşturuyoruz. Bu aşamada derleme (compile) gerçekleşir.
    - name: Build
      uses: docker/build-push-action@v6
      with:
        context: .
        tags: retro-go:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        load: true
        # ESP32-S3, Doom ve Retro Core hedeflemesi Dockerfile içinde yapılacaktır
        build-args: |
          TARGET=esp32-s3
          CORES=doom,retro

    # Derlenen firmware.bin ve .fw dosyalarını Docker içinden çıkarıyoruz
    - name: Extract binaries from docker image
      run: |
        mkdir -p build
        docker run --rm -v $(pwd)/build:/out retro-go:latest sh -c "cp build/*.bin /out/ && cp build/*.fw /out/ || true"
        ls -R build

    # Oluşan tüm dosyaları (firmware.bin dahil) indirilebilir hale getiriyoruz
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: kynexos-retro-firmware
        path: |
          build/*.bin
          build/*.fw
        if-no-files-found: error

