name: Sovereign Monolithic Build v266.0

on: [push]

jobs:
  build-monolith:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Cek
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Sovereign Monolith Derleme (Docker)
        run: |
          # MUHAMMED: Docker içindeki rg_tool komutunu 'all' hedefine çevirdik.
          # Bu sayede launcher derlenirken NES, GB, Doom çekirdeklerini de içine mühürler.
          docker build -t retro-go-builder .
          docker run --name monolith-container retro-go-builder /bin/true
          mkdir -p release_bins
          
          # İşte her şeyin birleştiği an!
          docker cp monolith-container:/kynex_out/. ./release_bins/
          docker rm monolith-container

      - name: Monolitik Paketi Yukle
        uses: actions/upload-artifact@v4
        with:
          name: Sovereign_Monolith_v266
          path: release_bins/
