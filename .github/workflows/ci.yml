# **************************************************************************
# * Kynex Sovereign - Launcher Only Build CI v245.0
# * Geliştirici: Muhammed (Kynex)
# * Görev: Sadece Retro-Go Launcher'ı (launcher.bin) derler, diğerlerini atlar.
# * Talimat: Asla satır silmeden, tam ve tek parça kod blokları içinde ver.
# **************************************************************************

name: Sovereign Launcher Only Build v245.0

on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-launcher:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Cek
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Sadece Retro-Go Derleme (Launcher - Docker)
        run: |
          # MUHAMMED: KynexOs ve FFat zaten saglam! Sadece Retro-Go'yu (Launcher) derliyoruz.
          docker build -t retro-go-builder .
          docker run --name temp-container retro-go-builder /bin/true
          mkdir -p release_bins
          docker cp temp-container:/kynex_out/launcher.bin ./release_bins/launcher.bin
          docker rm temp-container

      - name: Sovereign Hizli Paket Yukle
        uses: actions/upload-artifact@v4
        with:
          name: Sovereign_Launcher_Only_v245
          path: release_bins/launcher.bin
          compression-level: 9
