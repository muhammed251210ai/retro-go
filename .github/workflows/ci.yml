# **************************************************************************
# * Kynex Sovereign - Retro-Go Independent CI v195.0
# * Geliştirici: Muhammed (Kynex)
# * Hata Düzeltme: Submodule recursive fetch garantisi.
# * Talimat: Asla satır silmeden, tam ve tek parça kod blokları içinde ver.
# **************************************************************************

name: RetroGo_Sovereign_CI

on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodlari Cek (Submoduller Dahil)
        uses: actions/checkout@v4
        with:
          # MUHAMMED: Bu satır olmazsa derleyici "dosya yok" diye ağlar.
          submodules: 'recursive'
          fetch-depth: 0

      - name: Docker ile S3 Launcher Üret
        run: |
          docker build -t retro-go-builder .
          
          # Konteynırdan dosyaları cımbızla çekiyoruz
          docker run --name temp-container retro-go-builder /bin/true
          
          docker cp temp-container:/app/build/launcher.bin ./launcher.bin
          docker cp temp-container:/app/build/bootloader/bootloader.bin ./bootloader.bin
          docker cp temp-container:/app/build/partition_table/partition-table.bin ./partitions.bin
          
          docker rm temp-container

      - name: Retro-Go Paketini Yukle (Adres: 0x10000)
        uses: actions/upload-artifact@v4
        with:
          name: Kynex_RetroGo_S3_Bins
          path: |
            launcher.bin
            bootloader.bin
            partitions.bin
          compression-level: 9
