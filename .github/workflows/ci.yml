# **************************************************************************
# * Kynex Sovereign - Trojan Horse Build v284.0
# **************************************************************************
name: Sovereign Trojan Build v284.0
on: [push]
jobs:
  build-sovereign:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Cek
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0
      - name: Truva Ati Fabrikasini Calistir
        run: |
          docker build -t factory .
          docker run --name container factory /bin/true
          mkdir -p output
          docker cp container:/kynex_out/. ./output/
          docker rm container
      - name: Log ve Bin Paketini Yukle
        uses: actions/upload-artifact@v4
        with:
          name: Kynex_Sovereign_V284_LOGS
          path: output/
