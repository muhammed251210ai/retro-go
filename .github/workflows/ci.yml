name: Sovereign Masterpiece Build v294.0
on: [push]
jobs:
  build-sovereign:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Cek
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0
      - name: Masterpiece Fabrikasini Calistir
        run: |
          docker build -t masterpiece_factory .
          docker create --name kynex_final masterpiece_factory
          mkdir -p output
          docker cp kynex_final:/kynex_out/. ./output/
          docker rm kynex_final
      - name: Kynex Sovereign Paketi (Full IMG Dahil)
        uses: actions/upload-artifact@v4
        with:
          name: Kynex_Sovereign_V294_FINAL
          path: output/
