# **************************************************************************
# * Kynex Sovereign - Unified CI v214.0 (Launcher + Pure Storage)
# * Geliştirici: Muhammed (Kynex)
# * Donanım: ESP32-S3 N16R8 (16MB)
# * Not: KynexOs adımı atlandı, sadece Retro-Go ve Storage aktif.
# * Hata Düzeltme: mkfatfs exit code 1 (Path & Format Fix).
# * Talimat: Asla satır silmeden, tam ve tek parça kod blokları içinde ver.
# **************************************************************************

name: RetroGo_Sovereign_Full_CI

on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # 🕹️ JOB 1: RETRO-GO (SİSTEM 1 - FACTORY)
  build-retro-go:
    runs-on: ubuntu-latest
    steps:
      - name: Kodlari Cek
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Docker ile S3 Launcher Uret
        run: |
          docker build -t retro-go-builder .
          docker run --name temp-container retro-go-builder /bin/true
          docker cp temp-container:/kynex_out/launcher.bin ./launcher.bin
          docker cp temp-container:/kynex_out/bootloader.bin ./bootloader.bin
          docker cp temp-container:/kynex_out/partition-table.bin ./partitions.bin
          docker rm temp-container

      - name: Launcher Paketini Yukle
        uses: actions/upload-artifact@v4
        with:
          name: 01_RetroGo_Launcher_Package
          path: |
            launcher.bin
            bootloader.bin
            partitions.bin

  # 📂 JOB 2: STORAGE (FFAT - ELDEKİ ÇEKİRDEKLER VE OYUNLAR)
  build-storage:
    runs-on: ubuntu-latest
    steps:
      - name: Kodlari Cek
        uses: actions/checkout@v4

      - name: FFat Aracini Kur (mkfatfs)
        run: |
          python -m pip install --upgrade pip
          pip install platformio
          pio pkg install --global --tool platformio/tool-mkfatfs
          MKFATFS_RAW_PATH=$(find ~/.platformio/packages/tool-mkfatfs -name "mkfatfs" | head -n 1)
          echo "MKFATFS_EXE=$MKFATFS_RAW_PATH" >> $GITHUB_ENV

      - name: FFat Imajini Paketle
        run: |
          # Klasör yapısını ve mutlak yolu garantiye alıyoruz
          mkdir -p storage/data/retro-go/cores
          mkdir -p storage/data/roms
          touch storage/data/kynex_readme.txt
          
          # Boyut: 0x7F0000 = 8323072 byte
          # Bazı mkfatfs sürümleri -t ffat istemez, direkt imaj üretir.
          # Kaynak dizini mutlak yol (absolute path) olarak veriyoruz.
          echo "Paketleme basliyor..."
          ${{ env.MKFATFS_EXE }} -c $(pwd)/storage/data/ -s 8323072 ffat.bin
          echo "Paketleme tamamlandi."

      - name: Storage Paketini Yukle (Adres: 0x810000)
        uses: actions/upload-artifact@v4
        with:
          name: 02_Storage_Package
          path: ffat.bin
