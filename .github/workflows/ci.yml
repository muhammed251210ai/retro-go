name: ci

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Cleanup runner
      run: |
        sudo rm -rf /opt/microsoft /usr/local/.ghcup /usr/local/julia* /usr/share/dotnet /usr/share/swift /usr/lib/llvm*

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build
      uses: docker/build-push-action@v6
      with:
        context: .
        tags: retro-go:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        load: true
        # ✅ BURASI KRİTİK: S3 olduğunu GitHub'a burada zorla öğretiyoruz
        build-args: |
          TARGET=esp32s3
          TARGET_CHIP=esp32s3

    - name: Extract binaries from docker image
      run: |
        mkdir -p build
        # S3 için derlenen tüm parçaları bulup dışarı aktarır
        docker run --rm -v $(pwd)/build:/out retro-go:latest sh -c "find . -name '*.bin' -exec cp {} /out/ \;"
        ls -R build

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: kynexos-s3-binaries
        path: build/
