# **************************************************************************
# * Kynex Sovereign - Full Modular Build CI v270.0
# * Geliştirici: Muhammed (Kynex)
# * Görev: Tüm bin dosyalarını (Boot, Launcher, Cores) üretir ve paketler.
# **************************************************************************

name: Sovereign Full Modular Build v270.0

on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-sovereign-all:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Cek
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Sovereign Fabrikasini Calistir (Docker)
        run: |
          # Docker imajını oluştur (Dockerfile'ı kullanır)
          docker build -t sovereign-factory .
          
          # Konteynırdan çıktıları al
          docker run --name sovereign-container sovereign-factory /bin/true
          mkdir -p final_pack
          docker cp sovereign-container:/kynex_out/. ./final_pack/
          docker rm sovereign-container

      - name: Full Sovereign Paketini Yukle (Flash Ready)
        uses: actions/upload-artifact@v4
        with:
          name: Kynex_Sovereign_Full_Pack_v270
          path: final_pack/
          compression-level: 9
